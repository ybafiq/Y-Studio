<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Studio — Chat & Vision AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --panel-bg: #1e1f20;
            --input-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b4b4b4;
            --gemini-blue: #4285f4;
            --gemini-purple: #9b51e0;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b51e0, #ea4335);
            --border-color: #333537;
            --user-msg-bg: #2b2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 24px;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 500;
            background: var(--gemini-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 500;
        }

        .setting-group select, 
        .setting-group input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-group select:focus, 
        .setting-group input:focus {
            border-color: var(--gemini-blue);
        }

        .dimensions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* --- Main Chat Interface --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* --- Dynamic Chat Feed Container --- */
        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        .chat-feed-inner {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* --- Welcome Hero Block --- */
        .welcome-hero {
            text-align: left;
            margin-top: 10vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-hero h1 {
            font-size: 44px;
            font-weight: 500;
            background: linear-gradient(135deg, #4285f4 0%, #9b51e0 30%, #ea4335 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-hero p {
            color: var(--text-sub);
            font-size: 18px;
            max-width: 500px;
            line-height: 1.6;
        }

        /* --- Messages Styling --- */
        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* User Message (Right Side Aligned Bubble) */
        .message.user {
            align-items: flex-end;
        }

        .message.user .bubble {
            background-color: var(--user-msg-bg);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            max-width: 70%;
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
        }

        /* Model Message (Left Side Spark Native Layout) */
        .message.model {
            align-items: flex-start;
            padding-left: 36px;
            position: relative;
        }

        .message.model .avatar {
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--gemini-purple);
        }

        .message.model .text-content {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        /* Embedded Dynamic Image Card */
        .media-card {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #0b0c0d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            max-width: 100%;
            width: fit-content;
            margin-top: 8px;
        }

        .media-card img {
            display: block;
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }

        /* Embedded Action Row */
        .card-actions {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid var(--border-color);
            background: #18191a;
        }

        .btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2a2b2d;
        }

        /* --- Conversational Shimmer Card --- */
        .shimmer-placeholder {
            width: 350px;
            height: 350px;
            border-radius: 16px;
            background: linear-gradient(90deg, #1e1f20 25%, #2a2b2d 50%, #1e1f20 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }

        /* Text Streaming Shimmer Bars */
        .text-shimmer-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            min-width: 300px;
            margin-top: 8px;
        }
        .text-shimmer-bar {
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(90deg, #1e1f20 25%, #2a2b2d 50%, #1e1f20 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
        }

        @keyframes move-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- Gemini Modern Input Dock --- */
        .input-area-wrapper {
            padding: 0 24px 32px 24px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .prompt-box {
            width: 100%;
            max-width: 820px;
            background-color: var(--input-bg);
            border-radius: 32px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: border-color 0.3s;
        }

        .prompt-box:focus-within {
            border-color: #444;
        }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 12px 0;
            height: 44px;
            font-family: inherit;
        }

        .submit-btn {
            background: var(--gemini-gradient);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.1s, background 0.2s;
            flex-shrink: 0;
        }

        .submit-btn:hover {
            transform: scale(1.03);
        }

        .submit-btn:disabled {
            background: #3c4043;
            color: #80868b;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z" fill="url(#spark-grad)"/>
                <defs>
                    <linearGradient id="spark-grad" x1="2" y1="2" x2="21.52" y2="21.04" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#4285f4"/>
                        <stop offset="0.5" stop-color="#9b51e0"/>
                        <stop offset="1" stop-color="#ea4335"/>
                    </linearGradient>
                </defs>
            </svg>
            <span>Y Studio</span>
        </div>

        <div class="setting-group">
            <label for="chat-model">Text Chat Model</label>
            <select id="chat-model">
                <option value="openai" selected>GPT-4o (Smart & Fluid)</option>
                <option value="mistral">Mistral Large</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="model">Image Engine</label>
            <select id="model">
                <option value="flux" selected>FLUX.1 (High Fidelity)</option>
                <option value="turbo">SDXL-Turbo (Fast Render)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Image Aspect Size</label>
            <div class="dimensions-row">
                <input type="number" id="width" value="1024" min="64" max="2048" placeholder="Width">
                <input type="number" id="height" value="1024" min="64" max="2048" placeholder="Height">
            </div>
        </div>

        <div class="setting-group">
            <label for="seed">Image Seed</label>
            <input type="number" id="seed" placeholder="Random generation">
        </div>
    </aside>

    <main class="main-content">
        
        <div class="chat-feed" id="chat-feed">
            <div class="chat-feed-inner" id="chat-feed-inner">
                
                <div class="welcome-hero" id="welcome-hero">
                    <h1>Hello, I'm Y Studio</h1>
                    <p>I can chat, answer complex questions, write code, or dynamically build high-fidelity graphics. Try saying: <i>"Write a short poem"</i> or <i>"Draw a futuristic city cyberpunk style"</i>.</p>
                </div>

            </div>
        </div>

        <div class="input-area-wrapper">
            <div class="prompt-box">
                <input type="text" id="prompt-input" class="prompt-input" placeholder="Type a message or ask to generate an image..." autocomplete="off">
                <button id="submit-btn" class="submit-btn" title="Send Context">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const IMAGE_API_BASE = "https://image.pollinations.ai/prompt";
        const TEXT_API_BASE = "https://text.pollinations.ai";

        // Global Chat Memory to keep conversation contextual
        let conversationHistory = [
            { role: "system", content: "You are Gemini Studio, an advanced, helpful AI companion with image generation abilities. If the user asks you to modify or generate an image, reply confirming you can create it." }
        ];

        // DOM Hooks
        const promptInput = document.getElementById('prompt-input');
        const submitBtn = document.getElementById('submit-btn');
        const chatFeed = document.getElementById('chat-feed');
        const chatFeedInner = document.getElementById('chat-feed-inner');
        const welcomeHero = document.getElementById('welcome-hero');
        
        // Settings State Hooks
        const chatModelSelect = document.getElementById('chat-model');
        const modelSelect = document.getElementById('model');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const seedInput = document.getElementById('seed');

        // Check if user text explicitly implies an image request
        function isImageIntent(text) {
            const dynamicKeywords = ['draw', 'generate', 'create an image', 'make a picture', 'render', 'paint', 'image of', 'photo of', 'visualize'];
            return dynamicKeywords.some(keyword => text.toLowerCase().includes(keyword));
        }

        // Main Conversational Routing Pipeline
        async function runConversationTurn() {
            const userInput = promptInput.value.trim();
            if (!userInput) return;

            if (welcomeHero) welcomeHero.remove();

            // 1. Inject User Message bubble
            appendUserMessage(userInput);
            promptInput.value = '';
            submitBtn.disabled = true;

            // Determine if request handles Chat versus Art generation
            const structuralImageRequest = isImageIntent(userInput);

            // 2. Spawn response node with appropriate loading shimmers
            const { updateContent, embedImageCard, appendError, removeLoading } = createAgentResponseStream(structuralImageRequest);
            scrollToBottom();

            if (structuralImageRequest) {
                // --- IMAGE PIPELINE ---
                updateContent("Processing vision aesthetics and painting your request...");
                
                const width = parseInt(widthInput.value) || 1024;
                const height = parseInt(heightInput.value) || 1024;
                const model = modelSelect.value;
                const seed = seedInput.value.trim();

                const params = new URLSearchParams({
                    width: width, height: height, model: model,
                    nologo: 'true', private: 'true', enhance: 'false'
                });
                if (seed) params.append('seed', seed);

                const targetImageUrl = `${IMAGE_API_BASE}/${encodeURIComponent(userInput)}?${params.toString()}`;

                try {
                    const response = await fetch(targetImageUrl);
                    if (!response.ok) throw new Error("API structural failure across image lines.");
                    const blobData = await response.blob();
                    const locallyTrackedBlobURL = URL.createObjectURL(blobData);

                    updateContent(`I've finalized your graphic using the **${model.toUpperCase()}** image engine pipeline:`);
                    embedImageCard(locallyTrackedBlobURL, targetImageUrl, userInput);
                    
                    // Synchronize image statement details into conversational log memory
                    conversationHistory.push({ role: "user", content: userInput });
                    conversationHistory.push({ role: "assistant", content: `[Generated Image for: ${userInput}]` });
                } catch (err) {
                    appendError(`Failed rendering that graphic asset. Detail: ${err.message}`);
                } finally {
                    submitBtn.disabled = false;
                    scrollToBottom();
                }
            } else {
                // --- TEXT CONVERSATION PIPELINE ---
                conversationHistory.push({ role: "user", content: userInput });

                try {
                    // Pull selected LLM flavor engine preference setup
                    const chosenTextModel = chatModelSelect.value;
                    
                    const response = await fetch(TEXT_API_BASE, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            model: chosenTextModel,
                            code: "beautify" // optimizes markdown responses nicely
                        })
                    });

                    if (!response.ok) throw new Error("Text network stream returned abnormal parameters.");
                    const aiTextResponse = await response.text();

                    removeLoading();
                    updateContent(aiTextResponse);
                    
                    // Commit to conversation memory arrays
                    conversationHistory.push({ role: "assistant", content: aiTextResponse });
                } catch (err) {
                    appendError(`I lost tracking across my conversation thread. Detail: ${err.message}`);
                } finally {
                    submitBtn.disabled = false;
                    scrollToBottom();
                }
            }
        }

        // --- View Injection Utilities ---

        function appendUserMessage(text) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message user';
            msgRow.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatFeedInner.appendChild(msgRow);
        }

        function createAgentResponseStream(isImageLoading) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message model';
            
            let loadingPlaceholderHtml = '';
            if (isImageLoading) {
                loadingPlaceholderHtml = `<div class="shimmer-placeholder"></div>`;
            } else {
                loadingPlaceholderHtml = `
                    <div class="text-shimmer-container">
                        <div class="text-shimmer-bar" style="width: 85%;"></div>
                        <div class="text-shimmer-bar" style="width: 95%;"></div>
                        <div class="text-shimmer-bar" style="width: 60%;"></div>
                    </div>`;
            }

            msgRow.innerHTML = `
                <div class="avatar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z"/>
                    </svg>
                </div>
                <div class="text-content"></div>
                ${loadingPlaceholderHtml}
            `;
            
            chatFeedInner.appendChild(msgRow);
            
            const textContentNode = msgRow.querySelector('.text-content');
            const loaderNode = isImageLoading ? msgRow.querySelector('.shimmer-placeholder') : msgRow.querySelector('.text-shimmer-container');

            // Set aspect configurations on dynamic graphical shimmer box parameters
            if (isImageLoading && loaderNode) {
                const w = parseInt(widthInput.value) || 1024;
                const h = parseInt(heightInput.value) || 1024;
                if (w < h) {
                    loaderNode.style.height = '350px';
                    loaderNode.style.width = `${(w / h) * 350}px`;
                } else {
                    loaderNode.style.width = '100%';
                    loaderNode.style.maxWidth = '450px';
                    loaderNode.style.height = `${(h / w) * 450}px`;
                }
            }

            return {
                updateContent: (txt) => { textContentNode.textContent = txt; },
                removeLoading: () => { if (loaderNode) loaderNode.remove(); },
                embedImageCard: (blobUrl, fallbackUrl, altText) => {
                    if (loaderNode) loaderNode.remove();
                    
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    card.innerHTML = `
                        <img src="${blobUrl}" alt="${escapeHtml(altText)}">
                        <div class="card-actions">
                            <a class="btn" href="${blobUrl}" download="${altText.substring(0,15).replace(/[^a-z0-9]/gi, '_')}.jpg">
                                Download Graphic
                            </a>
                            <a class="btn" href="${fallbackUrl}" target="_blank">
                                Open Source Web Link
                            </a>
                        </div>
                    `;
                    msgRow.appendChild(card);
                    card.querySelector('img').onload = scrollToBottom;
                },
                appendError: (errMsg) => {
                    if (loaderNode) loaderNode.remove();
                    textContentNode.style.color = '#ff6b6b';
                    textContentNode.textContent = errMsg;
                }
            };
        }

        function scrollToBottom() {
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // --- Event Listener Assignments ---
        submitBtn.addEventListener('click', runConversationTurn);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) runConversationTurn();
        });
    </script>
</body>
</html>
