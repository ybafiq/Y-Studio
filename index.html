<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqavox - Advanced Chat & Vision Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1011;
            --panel-bg: #161719;
            --input-bg: #1e2022;
            --text-main: #f0f1f3;
            --text-sub: #9ea4ac;
            --y-accent: #00e5ff;
            --y-gradient: linear-gradient(135deg, #00e5ff, #7b1fa2);
            --border-color: #282a2d;
            --user-msg-bg: #2a2c30;
            --sidebar-width: 300px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Collapsible Sidebar & Panel Layout --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Gemini Class Selector for Hiding States */
        body.sidebar-hidden .sidebar {
            margin-left: calc(-1 * var(--sidebar-width));
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--y-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            height: 40px;
        }

        .sidebar-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-color);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--panel-bg);
            color: var(--y-accent);
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* --- Asset Vault Container --- */
        .vault-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .vault-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            background: #000;
        }

        .vault-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .vault-item:hover img {
            transform: scale(1.05);
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-group select, 
        .setting-group input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-group select:focus, 
        .setting-group input:focus {
            border-color: var(--y-accent);
        }

        .dimensions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* --- Main Content Space --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Floating Nav Header Area for Menu Control Toggle */
        .header-nav {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 5;
        }

        .menu-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-toggle-btn:hover {
            background: var(--panel-bg);
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        .chat-feed-inner {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .welcome-hero {
            text-align: left;
            margin-top: 5vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-hero h1 {
            font-size: 44px;
            font-weight: 700;
            background: var(--y-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-hero p {
            color: var(--text-sub);
            font-size: 16px;
            max-width: 520px;
            line-height: 1.6;
        }

        .command-tag-list {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .cmd-tag {
            background: #212327;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
        }
        .cmd-tag:hover {
            color: var(--y-accent);
            border-color: #444;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.user .bubble {
            background-color: var(--user-msg-bg);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.model {
            align-items: flex-start;
            padding-left: 36px;
            position: relative;
        }

        .message.model .avatar {
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--y-accent);
        }

        .message.model .text-content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 8px;
            width: 100%;
        }

        .message.model .text-content p { margin-bottom: 12px; }

        .macro-tuning-row {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: #111214;
            border-top: 1px solid rgba(255,255,255,0.03);
            flex-wrap: wrap;
        }

        .tuning-pill {
            background: #1c1e22;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tuning-pill:hover {
            color: var(--y-accent);
            border-color: var(--y-accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .media-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #0b0c0d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            max-width: 100%;
            width: fit-content;
            margin-top: 8px;
        }

        .media-card img {
            display: block;
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: #121315;
        }

        .btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--input-bg);
            border-color: var(--y-accent);
        }

        .shimmer-placeholder {
            width: 350px;
            height: 350px;
            border-radius: 12px;
            background: linear-gradient(90deg, #161719 25%, #222428 50%, #161719 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }

        .text-shimmer-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            min-width: 320px;
            margin-top: 8px;
        }
        .text-shimmer-bar {
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(90deg, #161719 25%, #222428 50%, #161719 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
        }

        @keyframes move-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .input-area-wrapper {
            padding: 0 24px 32px 24px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .prompt-box {
            width: 100%;
            max-width: 820px;
            background-color: var(--input-bg);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .prompt-box:focus-within {
            border-color: var(--y-accent);
        }

        .prompt-box.vision-active {
            border-color: #9b51e0;
            background-color: #1e1b26;
            box-shadow: 0 4px 24px rgba(155, 81, 224, 0.25);
        }

        .mode-toggle-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            transition: all 0.2s;
            margin-right: 8px;
        }
        .mode-toggle-btn:hover {
            color: var(--text-main);
            background: #2b2c30;
        }
        .prompt-box.vision-active .mode-toggle-btn {
            color: #9b51e0;
            background: rgba(155, 81, 224, 0.15);
        }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 12px 0;
            height: 44px;
            font-family: inherit;
        }

        .submit-btn {
            background: var(--y-gradient);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.1s;
            flex-shrink: 0;
        }

        .submit-btn:hover { transform: scale(1.02); }
        .submit-btn:disabled {
            background: #25272a;
            color: #5f6368;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <!-- Navigable Collapsible Sidebar Component -->
    <aside class="sidebar" id="app-sidebar">
        <div class="logo-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z" fill="url(#y-studio-grad)"/>
                <defs>
                    <linearGradient id="y-studio-grad" x1="2" y1="2" x2="21.52" y2="21.04" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#00e5ff"/>
                        <stop offset="1" stop-color="#7b1fa2"/>
                    </linearGradient>
                </defs>
            </svg>
            <span>Aqavox</span>
        </div>

        <div class="sidebar-tabs">
            <button id="tab-config" class="tab-btn active" onclick="switchSidebarTab('config')">Settings</button>
            <button id="tab-vault" class="tab-btn" onclick="switchSidebarTab('vault')">Asset Vault</button>
        </div>

        <div class="panel-content" id="sidebar-panel-container">
            <div id="panel-config" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="setting-group">
                    <label for="chat-model">Text Model</label>
                    <select id="chat-model">
                        <option value="openai" selected>GPT-4o (Smart & Fluid)</option>
                        <option value="mistral">Mistral Large</option>
                        <option value="llama">Llama 3 (Meta Open Source)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="model">Image Engine</label>
                    <select id="model">
                        <option value="flux" selected>FLUX.1 (High Fidelity)</option>
                        <option value="turbo">SDXL-Turbo (Fast Render)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Image Aspect Size</label>
                    <div class="dimensions-row">
                        <input type="number" id="width" value="1024" min="64" max="2048" placeholder="Width">
                        <input type="number" id="height" value="1024" min="64" max="2048" placeholder="Height">
                    </div>
                </div>

                <div class="setting-group">
                    <label for="seed">Image Seed</label>
                    <input type="number" id="seed" placeholder="Random generation">
                </div>
            </div>

            <div id="panel-vault" style="display: none;">
                <div class="vault-grid" id="vault-grid-target"></div>
            </div>
        </div>
        
        <button class="btn" style="margin-top:auto; justify-content:center;" onclick="clearWorkspace()">
            Reset Workspace
        </button>
    </aside>

    <main class="main-content">
        <!-- Floating Header Area containing hamburger menu toggle -->
        <header class="header-nav">
            <button class="menu-toggle-btn" title="Toggle Sidebar Menu" onclick="toggleSidebarState()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </header>

        <div class="chat-feed" id="chat-feed">
            <div class="chat-feed-inner" id="chat-feed-inner">
                
                <div class="welcome-hero" id="welcome-hero">
                    <h1>Welcome to Aqavox</h1>
                    <p>An advanced workspace for continuous text processing and image architecture. Toggle the image icon to generate graphic assets directly.</p>
                    <div class="command-tag-list">
                        <div class="cmd-tag" onclick="toggleVisionMode(true)">Switch to Image Mode</div>
                        <div class="cmd-tag" onclick="toggleVisionMode(false)">Switch to Chat Mode</div>
                        <div class="cmd-tag" onclick="clearWorkspace()">Reset View</div>
                    </div>
                </div>

            </div>
        </div>

        <div class="input-area-wrapper">
            <div class="prompt-box" id="input-container">
                <button id="mode-toggle" class="mode-toggle-btn" title="Toggle Vision/Image Mode" onclick="handleModeClick()">
                    <svg id="mode-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path id="chat-path" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
                <input type="text" id="prompt-input" class="prompt-input" placeholder="Type a message..." autocomplete="off">
                <button id="submit-btn" class="submit-btn" title="Send Request">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const IMAGE_API_BASE = "https://image.pollinations.ai/prompt";
        const TEXT_API_BASE = "https://text.pollinations.ai";

        let conversationHistory = [];
        let isVisionModeActive = false;

        const promptInput = document.getElementById('prompt-input');
        const submitBtn = document.getElementById('submit-btn');
        const chatFeed = document.getElementById('chat-feed');
        const chatFeedInner = document.getElementById('chat-feed-inner');
        const welcomeHero = document.getElementById('welcome-hero');
        
        const inputContainer = document.getElementById('input-container');
        const modeIcon = document.getElementById('mode-icon');
        const vaultGridTarget = document.getElementById('vault-grid-target');
        
        const chatModelSelect = document.getElementById('chat-model');
        const modelSelect = document.getElementById('model');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const seedInput = document.getElementById('seed');

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('ystudio_chat_model')) chatModelSelect.value = localStorage.getItem('ystudio_chat_model');
            if(localStorage.getItem('ystudio_img_model')) modelSelect.value = localStorage.getItem('ystudio_img_model');
            if(localStorage.getItem('ystudio_width')) widthInput.value = localStorage.getItem('ystudio_width');
            if(localStorage.getItem('ystudio_height')) heightInput.value = localStorage.getItem('ystudio_height');
            if(localStorage.getItem('ystudio_seed')) seedInput.value = localStorage.getItem('ystudio_seed');
            
            // Restore structural visibility preference tracking
            if(localStorage.getItem('ystudio_sidebar_hidden') === 'true') {
                document.body.classList.add('sidebar-hidden');
            }

            const savedHistory = localStorage.getItem('ystudio_history');
            if (savedHistory) {
                conversationHistory = JSON.parse(savedHistory);
                if (conversationHistory.length > 0 && welcomeHero) welcomeHero.remove();
                rebuildFeedFromHistory();
                updateVaultGrid();
            } else {
                resetHistoryObject();
            }
            toggleVisionMode(false);
        });

        // Toggle Gemini style Sidebar View State 
        function toggleSidebarState() {
            const isHiddenNow = document.body.classList.toggle('sidebar-hidden');
            localStorage.setItem('ystudio_sidebar_hidden', isHiddenNow);
            setTimeout(scrollToBottom, 100); // adjust feed positions smoothly layout shift finishes
        }

        function resetHistoryObject() {
            conversationHistory = [
                { 
                    role: "system", 
                    content: "You are Aqavox, an elite, automated AI studio setup. " +
                             "If the user discusses, modifies, or tweaks an image that was previously output inline, you must adaptively engineer a full comprehensive description reflecting their requested adjustments. Then, append exactly this instruction string format at the very end of your response text block: [GENERATE_IMAGE: your descriptive prompt here]."
                }
            ];
            saveHistoryToStorage();
        }

        function saveHistoryToStorage() {
            localStorage.setItem('ystudio_history', JSON.stringify(conversationHistory));
            updateVaultGrid();
        }

        function switchSidebarTab(targetTab) {
            document.getElementById('tab-config').classList.toggle('active', targetTab === 'config');
            document.getElementById('tab-vault').classList.toggle('active', targetTab === 'vault');
            
            document.getElementById('panel-config').style.display = targetTab === 'config' ? 'flex' : 'none';
            document.getElementById('panel-vault').style.display = targetTab === 'vault' ? 'block' : 'none';
        }

        function updateVaultGrid() {
            vaultGridTarget.innerHTML = '';
            conversationHistory.forEach(m => {
                if (m.role === 'assistant' && m.content.includes('__IMAGE_BLOB__')) {
                    const parts = m.content.split('__IMAGE_BLOB__:');
                    const imgMeta = parts[1] ? parts[1].split('|') : parts[0].replace('__IMAGE_BLOB__:', '').split('|');
                    const promptText = imgMeta[0];
                    const sourceUrl = imgMeta[1];

                    if(sourceUrl) {
                        const item = document.createElement('div');
                        item.className = 'vault-item';
                        item.title = promptText;
                        item.innerHTML = `<img src="${sourceUrl}" alt="Vault Graphic Asset">`;
                        item.onclick = () => {
                            toggleVisionMode(false);
                            promptInput.value = `Regarding your previous creation "${promptText}", let's modify it by `;
                            promptInput.focus();
                        };
                        vaultGridTarget.appendChild(item);
                    }
                }
            });
        }

        function applyTuningModifier(pillElement, basePrompt, adjustmentKeyword) {
            toggleVisionMode(false);
            promptInput.value = `Update the image of "${basePrompt}" to make it look like a ${adjustmentKeyword}`;
            runConversationTurn();
        }

        function handleModeClick() {
            toggleVisionMode(!isVisionModeActive);
        }

        function toggleVisionMode(activateVision) {
            isVisionModeActive = activateVision;
            if (isVisionModeActive) {
                inputContainer.classList.add('vision-active');
                promptInput.placeholder = "Describe the image you want to create...";
                modeIcon.innerHTML = `<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>`;
            } else {
                inputContainer.classList.remove('vision-active');
                promptInput.placeholder = "Type a message or ask to tweak an image...";
                modeIcon.innerHTML = `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>`;
            }
            promptInput.focus();
        }

        function clearWorkspace() {
            localStorage.removeItem('ystudio_history');
            localStorage.removeItem('ystudio_sidebar_hidden');
            location.reload();
        }

        async function triggerImageGeneration(promptText, renderingContainer) {
            const width = parseInt(widthInput.value) || 1024;
            const height = parseInt(heightInput.value) || 1024;
            const model = modelSelect.value;
            const seed = seedInput.value.trim();

            const params = new URLSearchParams({
                width: width, height: height, model: model,
                nologo: 'true', private: 'true', enhance: 'false'
            });
            if (seed) params.append('seed', seed);

            const targetImageUrl = `${IMAGE_API_BASE}/${encodeURIComponent(promptText)}?${params.toString()}`;

            try {
                const response = await fetch(targetImageUrl);
                if (!response.ok) throw new Error("API streaming pipeline handling breakdown.");
                const blobData = await response.blob();
                const localUrl = URL.createObjectURL(blobData);

                renderingContainer.embedImageCard(localUrl, targetImageUrl, promptText);
                return targetImageUrl;
            } catch (err) {
                renderingContainer.appendError(`Render pipeline error: ${err.message}`);
                return null;
            }
        }

        async function runConversationTurn() {
            let rawInput = promptInput.value.trim();
            if (!rawInput) return;

            if (welcomeHero) welcomeHero.remove();

            appendUserMessage(rawInput);
            promptInput.value = '';
            submitBtn.disabled = true;

            if (isVisionModeActive) {
                const { updateContent, embedImageCard, appendError } = createAgentResponseStream(true);
                scrollToBottom();
                updateContent(`Rendering vision target request...`);
                
                const imgUrl = await triggerImageGeneration(rawInput, { embedImageCard, appendError });
                if (imgUrl) {
                    conversationHistory.push({ role: "user", content: `[Image Request]: ${rawInput}` });
                    conversationHistory.push({ role: "assistant", content: `__IMAGE_BLOB__:${rawInput}|${imgUrl}` });
                    saveHistoryToStorage();
                }
                
                toggleVisionMode(false);
                submitBtn.disabled = false;
                scrollToBottom();
                return;
            }

            const { updateContent, removeLoading, embedImageCard, appendError } = createAgentResponseStream(false);
            scrollToBottom();

            conversationHistory.push({ role: "user", content: rawInput });

            try {
                const response = await fetch(TEXT_API_BASE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: conversationHistory.map(m => {
                            if (m.content.startsWith('__IMAGE_BLOB__')) {
                                const splitData = m.content.replace('__IMAGE_BLOB__:', '').split('|');
                                return { role: "assistant", content: `[System Info: An image was generated previously matching this description: "${splitData[0]}"]` };
                            }
                            return m;
                        }),
                        model: chatModelSelect.value,
                        code: "beautify"
                    })
                });

                if (!response.ok) throw new Error("Text processing pipeline anomaly.");
                let aiResponseText = await response.text();

                removeLoading();

                const triggerRegex = /\[GENERATE_IMAGE:\s*(.*?)\]/i;
                const match = aiResponseText.match(triggerRegex);

                if (match) {
                    const parsedImagePrompt = match[1].trim();
                    let cleanDisplayMarkdown = aiResponseText.replace(triggerRegex, '').trim();
                    
                    updateContent(cleanDisplayMarkdown || `Updating image canvas configurations...`);
                    
                    const shimmerPlaceholder = document.createElement('div');
                    shimmerPlaceholder.className = 'shimmer-placeholder';
                    chatFeedInner.lastChild.appendChild(shimmerPlaceholder);
                    scrollToBottom();

                    const imgUrl = await triggerImageGeneration(parsedImagePrompt, { 
                        embedImageCard: (disp, src, alt) => {
                            shimmerPlaceholder.remove();
                            embedImageCard(disp, src, alt);
                        }, 
                        appendError: (err) => {
                            shimmerPlaceholder.remove();
                            appendError(err);
                        } 
                    });

                    if (imgUrl) {
                        conversationHistory.push({ role: "assistant", content: cleanDisplayMarkdown + `\n\n__IMAGE_BLOB__:${parsedImagePrompt}|${imgUrl}` });
                    }
                } else {
                    updateContent(aiResponseText);
                    conversationHistory.push({ role: "assistant", content: aiResponseText });
                }
                
                saveHistoryToStorage();
            } catch (err) {
                appendError(`Context tracking thread lost. Detail: ${err.message}`);
            } finally {
                submitBtn.disabled = false;
                scrollToBottom();
            }
        }

        // --- View Compilers ---

        function appendUserMessage(text) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message user';
            msgRow.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatFeedInner.appendChild(msgRow);
        }

        function createAgentResponseStream(isImageLoading) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message model';
            
            let loadingHtml = isImageLoading ? 
                `<div class="shimmer-placeholder"></div>` : 
                `<div class="text-shimmer-container">
                    <div class="text-shimmer-bar" style="width: 80%;"></div>
                    <div class="text-shimmer-bar" style="width: 90%;"></div>
                    <div class="text-shimmer-bar" style="width: 55%;"></div>
                 </div>`;

            msgRow.innerHTML = `
                <div class="avatar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z"/>
                    </svg>
                </div>
                <div class="text-content"></div>
                ${loadingHtml}
            `;
            
            chatFeedInner.appendChild(msgRow);
            const textContentNode = msgRow.querySelector('.text-content');
            const loaderNode = isImageLoading ? msgRow.querySelector('.shimmer-placeholder') : msgRow.querySelector('.text-shimmer-container');

            return {
                updateContent: (txt) => { textContentNode.innerHTML = marked.parse(txt); },
                removeLoading: () => { if (loaderNode) loaderNode.remove(); },
                embedImageCard: (displayUrl, sourceUrl, altText) => {
                    if (loaderNode) loaderNode.remove();
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    const sanitizedAlt = escapeHtml(altText);
                    card.innerHTML = `
                        <img src="${displayUrl}" alt="${sanitizedAlt}">
                        <div class="card-actions">
                            <a class="btn" href="${displayUrl}" download="${sanitizedAlt.substring(0,12).replace(/[^a-z0-9]/gi, '_')}.jpg">Download</a>
                            <a class="btn" href="${sourceUrl}" target="_blank">Web Link</a>
                        </div>
                        <div class="macro-tuning-row">
                            <div class="tuning-pill" onclick="applyTuningModifier(this, '${sanitizedAlt.replace(/'/g, "\\'")}', 'photorealistic photography 8k resolution cinematic lighting')">📷 Photorealistic</div>
                            <div class="tuning-pill" onclick="applyTuningModifier(this, '${sanitizedAlt.replace(/'/g, "\\'")}', 'detailed anime illustration vector art style')">🎨 Anime Style</div>
                            <div class="tuning-pill" onclick="applyTuningModifier(this, '${sanitizedAlt.replace(/'/g, "\\'")}', 'cyberpunk neon glowing color palette aesthetic')">🌆 Cyberpunk</div>
                            <div class="tuning-pill" onclick="applyTuningModifier(this, '${sanitizedAlt.replace(/'/g, "\\'")}', 'pencil sketch hand drawn monochrome fine lines art')">✏️ Sketch</div>
                        </div>
                    `;
                    msgRow.appendChild(card);
                    card.querySelector('img').onload = scrollToBottom;
                },
                appendError: (errMsg) => {
                    if (loaderNode) loaderNode.remove();
                    textContentNode.style.color = '#ff6b6b';
                    textContentNode.textContent = errMsg;
                }
            };
        }

        function rebuildFeedFromHistory() {
            chatFeedInner.innerHTML = '';
            conversationHistory.forEach(msg => {
                if (msg.role === 'system') return;
                if (msg.role === 'user') {
                    appendUserMessage(msg.content);
                } else if (msg.role === 'assistant') {
                    const containsImage = msg.content.includes('__IMAGE_BLOB__:');
                    
                    if (containsImage) {
                        const parts = msg.content.split('\n\n__IMAGE_BLOB__:');
                        const textPart = parts[0];
                        const imgMeta = parts[1] ? parts[1].split('|') : parts[0].replace('__IMAGE_BLOB__:', '').split('|');
                        
                        const promptAlt = imgMeta[0];
                        const webSourceUrl = imgMeta[1];

                        const { updateContent, removeLoading, embedImageCard } = createAgentResponseStream(false);
                        removeLoading();
                        if(!textPart.startsWith('__IMAGE_BLOB__:')) {
                            updateContent(textPart);
                        } else {
                            updateContent(`Render pipeline lookup for "${promptAlt}":`);
                        }
                        embedImageCard(webSourceUrl, webSourceUrl, promptAlt);
                    } else {
                        const { updateContent, removeLoading } = createAgentResponseStream(false);
                        removeLoading();
                        updateContent(msg.content);
                    }
                }
            });
            setTimeout(scrollToBottom, 200);
        }

        function scrollToBottom() { chatFeed.scrollTop = chatFeed.scrollHeight; }
        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

        submitBtn.addEventListener('click', runConversationTurn);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) runConversationTurn();
        });
    </script>
</body>
