<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Studio — Advanced Chat & Vision Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1011;
            --panel-bg: #161719;
            --input-bg: #1e2022;
            --text-main: #f0f1f3;
            --text-sub: #9ea4ac;
            --y-accent: #00e5ff;
            --y-gradient: linear-gradient(135deg, #00e5ff, #7b1fa2);
            --border-color: #282a2d;
            --user-msg-bg: #2a2c30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 24px;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--y-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-group select, 
        .setting-group input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-group select:focus, 
        .setting-group input:focus {
            border-color: var(--y-accent);
        }

        .dimensions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* --- Main Content Space --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        .chat-feed-inner {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .welcome-hero {
            text-align: left;
            margin-top: 10vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-hero h1 {
            font-size: 44px;
            font-weight: 700;
            background: var(--y-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-hero p {
            color: var(--text-sub);
            font-size: 16px;
            max-width: 520px;
            line-height: 1.6;
        }

        .command-tag-list {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .cmd-tag {
            background: #212327;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--y-accent);
            cursor: pointer;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.user .bubble {
            background-color: var(--user-msg-bg);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.model {
            align-items: flex-start;
            padding-left: 36px;
            position: relative;
        }

        .message.model .avatar {
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--y-accent);
        }

        .message.model .text-content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 8px;
            width: 100%;
        }

        .message.model .text-content p { margin-bottom: 12px; }

        .message.model .text-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
            background-color: var(--panel-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        .message.model .text-content th, 
        .message.model .text-content td {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            text-align: left;
        }

        .message.model .text-content th {
            background-color: #1e2022;
            color: var(--y-accent);
            font-weight: 500;
        }

        .media-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #0b0c0d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            max-width: 100%;
            width: fit-content;
            margin-top: 8px;
        }

        .media-card img {
            display: block;
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid var(--border-color);
            background: #121315;
        }

        .btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--input-bg);
            border-color: var(--y-accent);
        }

        .shimmer-placeholder {
            width: 350px;
            height: 350px;
            border-radius: 12px;
            background: linear-gradient(90deg, #161719 25%, #222428 50%, #161719 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }

        .text-shimmer-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            min-width: 320px;
            margin-top: 8px;
        }
        .text-shimmer-bar {
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(90deg, #161719 25%, #222428 50%, #161719 75%);
            background-size: 200% 100%;
            animation: move-shimmer 1.5s infinite linear;
        }

        @keyframes move-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .input-area-wrapper {
            padding: 0 24px 32px 24px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .prompt-box {
            width: 100%;
            max-width: 820px;
            background-color: var(--input-bg);
            border-radius: 24px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }

        .prompt-box:focus-within {
            border-color: var(--y-accent);
        }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 12px 0;
            height: 44px;
            font-family: inherit;
        }

        .submit-btn {
            background: var(--y-gradient);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.1s;
            flex-shrink: 0;
        }

        .submit-btn:hover { transform: scale(1.02); }
        .submit-btn:disabled {
            background: #25272a;
            color: #5f6368;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z" fill="url(#y-studio-grad)"/>
                <defs>
                    <linearGradient id="y-studio-grad" x1="2" y1="2" x2="21.52" y2="21.04" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#00e5ff"/>
                        <stop offset="1" stop-color="#7b1fa2"/>
                    </linearGradient>
                </defs>
            </svg>
            <span>Y Studio</span>
        </div>

        <div class="setting-group">
            <label for="chat-model">Text Model</label>
            <select id="chat-model">
                <option value="openai" selected>GPT-4o (Smart & Fluid)</option>
                <option value="mistral">Mistral Large</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="model">Image Engine</label>
            <select id="model">
                <option value="flux" selected>FLUX.1 (High Fidelity)</option>
                <option value="turbo">SDXL-Turbo (Fast Render)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Image Aspect Size</label>
            <div class="dimensions-row">
                <input type="number" id="width" value="1024" min="64" max="2048" placeholder="Width">
                <input type="number" id="height" value="1024" min="64" max="2048" placeholder="Height">
            </div>
        </div>

        <div class="setting-group">
            <label for="seed">Image Seed</label>
            <input type="number" id="seed" placeholder="Random generation">
        </div>
        
        <button class="btn" style="margin-top:auto; justify-content:center;" onclick="clearWorkspace()">
            Reset Workspace
        </button>
    </aside>

    <main class="main-content">
        <div class="chat-feed" id="chat-feed">
            <div class="chat-feed-inner" id="chat-feed-inner">
                
                <div class="welcome-hero" id="welcome-hero">
                    <h1>Welcome to Y Studio</h1>
                    <p>An advanced local workspace for text chat and dynamic vision pipelines. Ask to generate something or alter previous layouts sequentially!</p>
                    <div class="command-tag-list">
                        <div class="cmd-tag" onclick="useCommand('/image ')">/image [prompt]</div>
                        <div class="cmd-tag" onclick="useCommand('/chat ')">/chat [message]</div>
                        <div class="cmd-tag" onclick="clearWorkspace()">/clear</div>
                    </div>
                </div>

            </div>
        </div>

        <div class="input-area-wrapper">
            <div class="prompt-box">
                <input type="text" id="prompt-input" class="prompt-input" placeholder="Type a message or ask to tweak an image..." autocomplete="off">
                <button id="submit-btn" class="submit-btn" title="Send Request">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const IMAGE_API_BASE = "https://image.pollinations.ai/prompt";
        const TEXT_API_BASE = "https://text.pollinations.ai";

        let conversationHistory = [];

        const promptInput = document.getElementById('prompt-input');
        const submitBtn = document.getElementById('submit-btn');
        const chatFeed = document.getElementById('chat-feed');
        const chatFeedInner = document.getElementById('chat-feed-inner');
        const welcomeHero = document.getElementById('welcome-hero');
        
        const chatModelSelect = document.getElementById('chat-model');
        const modelSelect = document.getElementById('model');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const seedInput = document.getElementById('seed');

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('ystudio_chat_model')) chatModelSelect.value = localStorage.getItem('ystudio_chat_model');
            if(localStorage.getItem('ystudio_img_model')) modelSelect.value = localStorage.getItem('ystudio_img_model');
            if(localStorage.getItem('ystudio_width')) widthInput.value = localStorage.getItem('ystudio_width');
            if(localStorage.getItem('ystudio_height')) heightInput.value = localStorage.getItem('ystudio_height');
            if(localStorage.getItem('ystudio_seed')) seedInput.value = localStorage.getItem('ystudio_seed');

            const savedHistory = localStorage.getItem('ystudio_history');
            if (savedHistory) {
                conversationHistory = JSON.parse(savedHistory);
                if (conversationHistory.length > 0 && welcomeHero) welcomeHero.remove();
                rebuildFeedFromHistory();
            } else {
                resetHistoryObject();
            }
        });

        function resetHistoryObject() {
            conversationHistory = [
                { 
                    role: "system", 
                    content: "You are Y Studio, a specialized assistant. You have conversational capabilities and image-generation integration. " +
                             "CRITICAL RULE: If the user asks to modify, update, change, or adjust an image that was previously generated in the chat, you MUST rewrite the entire full image prompt to incorporate their changes. Then, respond ONLY with this bracket syntax at the end of your response text: [GENERATE_IMAGE: your newly engineered, comprehensive descriptive prompt here]. Do not forget the brackets."
                }
            ];
            saveHistoryToStorage();
        }

        function saveHistoryToStorage() {
            localStorage.setItem('ystudio_history', JSON.stringify(conversationHistory));
        }

        function useCommand(cmd) {
            promptInput.value = cmd;
            promptInput.focus();
        }

        function clearWorkspace() {
            localStorage.removeItem('ystudio_history');
            location.reload();
        }

        function isExplicitImageCmd(text) {
            if (text.startsWith('/image ')) return true;
            if (text.startsWith('/chat ')) return false;
            const absoluteKeywords = ['generate an image of', 'create an image of', 'draw a picture of', 'render an image of'];
            return absoluteKeywords.some(k => text.toLowerCase().includes(k));
        }

        async function triggerImageGeneration(promptText, renderingContainer) {
            const width = parseInt(widthInput.value) || 1024;
            const height = parseInt(heightInput.value) || 1024;
            const model = modelSelect.value;
            const seed = seedInput.value.trim();

            const params = new URLSearchParams({
                width: width, height: height, model: model,
                nologo: 'true', private: 'true', enhance: 'false'
            });
            if (seed) params.append('seed', seed);

            const targetImageUrl = `${IMAGE_API_BASE}/${encodeURIComponent(promptText)}?${params.toString()}`;

            try {
                const response = await fetch(targetImageUrl);
                if (!response.ok) throw new Error("API streaming handling breakdown.");
                const blobData = await response.blob();
                const localUrl = URL.createObjectURL(blobData);

                renderingContainer.embedImageCard(localUrl, targetImageUrl, promptText);
                return targetImageUrl;
            } catch (err) {
                renderingContainer.appendError(`Render pipeline error: ${err.message}`);
                return null;
            }
        }

        async function runConversationTurn() {
            let rawInput = promptInput.value.trim();
            if (!rawInput) return;

            if (rawInput === '/clear') { clearWorkspace(); return; }
            if (welcomeHero) welcomeHero.remove();

            let cleanInput = rawInput;
            if (rawInput.startsWith('/image ')) cleanInput = rawInput.replace('/image ', '');
            if (rawInput.startsWith('/chat ')) cleanInput = rawInput.replace('/chat ', '');

            appendUserMessage(rawInput);
            promptInput.value = '';
            submitBtn.disabled = true;

            // Step 1: Check if this is an explicit root image command
            if (isExplicitImageCmd(rawInput)) {
                const { updateContent, embedImageCard, appendError } = createAgentResponseStream(true);
                scrollToBottom();
                updateContent(`Generating fresh vision context...`);
                
                const imgUrl = await triggerImageGeneration(cleanInput, { embedImageCard, appendError });
                if (imgUrl) {
                    conversationHistory.push({ role: "user", content: rawInput });
                    conversationHistory.push({ role: "assistant", content: `__IMAGE_BLOB__:${cleanInput}|${imgUrl}` });
                    saveHistoryToStorage();
                }
                submitBtn.disabled = false;
                scrollToBottom();
                return;
            }

            // Step 2: Handle it through the conversational pipeline (allows adjusting previous pictures)
            const { updateContent, removeLoading, embedImageCard, appendError } = createAgentResponseStream(false);
            scrollToBottom();

            conversationHistory.push({ role: "user", content: cleanInput });

            try {
                const response = await fetch(TEXT_API_BASE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // Parse cleanly without passing visual system metadata tags directly
                        messages: conversationHistory.map(m => {
                            if (m.content.startsWith('__IMAGE_BLOB__')) {
                                const splitData = m.content.replace('__IMAGE_BLOB__:', '').split('|');
                                return { role: "assistant", content: `[System: An image was generated previously matching this description: "${splitData[0]}"]` };
                            }
                            return m;
                        }),
                        model: chatModelSelect.value,
                        code: "beautify"
                    })
                });

                if (!response.ok) throw new Error("Text processing pipeline anomaly.");
                let aiResponseText = await response.text();

                removeLoading();

                // Check if the LLM decided to execute an image alteration request
                const triggerRegex = /\[GENERATE_IMAGE:\s*(.*?)\]/i;
                const match = aiResponseText.match(triggerRegex);

                if (match) {
                    const parsedImagePrompt = match[1].trim();
                    // Strip the execution code wrapper out of the final bubble text view
                    let cleanDisplayMarkdown = aiResponseText.replace(triggerRegex, '').trim();
                    
                    updateContent(cleanDisplayMarkdown || `Updating image with new adjustments...`);
                    
                    // Transform loader into image shimmer preview block
                    const shimmerPlaceholder = document.createElement('div');
                    shimmerPlaceholder.className = 'shimmer-placeholder';
                    chatFeedInner.lastChild.appendChild(shimmerPlaceholder);
                    scrollToBottom();

                    const imgUrl = await triggerImageGeneration(parsedImagePrompt, { 
                        embedImageCard: (disp, src, alt) => {
                            shimmerPlaceholder.remove();
                            embedImageCard(disp, src, alt);
                        }, 
                        appendError: (err) => {
                            shimmerPlaceholder.remove();
                            appendError(err);
                        } 
                    });

                    if (imgUrl) {
                        conversationHistory.push({ role: "assistant", content: cleanDisplayMarkdown + `\n\n__IMAGE_BLOB__:${parsedImagePrompt}|${imgUrl}` });
                    }
                } else {
                    updateContent(aiResponseText);
                    conversationHistory.push({ role: "assistant", content: aiResponseText });
                }
                
                saveHistoryToStorage();
            } catch (err) {
                appendError(`Context tracking thread lost. Detail: ${err.message}`);
            } finally {
                submitBtn.disabled = false;
                scrollToBottom();
            }
        }

        // --- View Compilers ---

        function appendUserMessage(text) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message user';
            msgRow.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatFeedInner.appendChild(msgRow);
        }

        function createAgentResponseStream(isImageLoading) {
            const msgRow = document.createElement('div');
            msgRow.className = 'message model';
            
            let loadingHtml = isImageLoading ? 
                `<div class="shimmer-placeholder"></div>` : 
                `<div class="text-shimmer-container">
                    <div class="text-shimmer-bar" style="width: 80%;"></div>
                    <div class="text-shimmer-bar" style="width: 90%;"></div>
                    <div class="text-shimmer-bar" style="width: 55%;"></div>
                 </div>`;

            msgRow.innerHTML = `
                <div class="avatar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L14.76 8.76L21.52 11.52L14.76 14.28L12 21.04L9.24 14.28L2.48 11.52L9.24 8.76L12 2Z"/>
                    </svg>
                </div>
                <div class="text-content"></div>
                ${loadingHtml}
            `;
            
            chatFeedInner.appendChild(msgRow);
            const textContentNode = msgRow.querySelector('.text-content');
            const loaderNode = isImageLoading ? msgRow.querySelector('.shimmer-placeholder') : msgRow.querySelector('.text-shimmer-container');

            return {
                updateContent: (txt) => { textContentNode.innerHTML = marked.parse(txt); },
                removeLoading: () => { if (loaderNode) loaderNode.remove(); },
                embedImageCard: (displayUrl, sourceUrl, altText) => {
                    if (loaderNode) loaderNode.remove();
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    card.innerHTML = `
                        <img src="${displayUrl}" alt="${escapeHtml(altText)}">
                        <div class="card-actions">
                            <a class="btn" href="${displayUrl}" download="${altText.substring(0,12).replace(/[^a-z0-9]/gi, '_')}.jpg">Download</a>
                            <a class="btn" href="${sourceUrl}" target="_blank">Web Link</a>
                        </div>
                    `;
                    msgRow.appendChild(card);
                    card.querySelector('img').onload = scrollToBottom;
                },
                appendError: (errMsg) => {
                    if (loaderNode) loaderNode.remove();
                    textContentNode.style.color = '#ff6b6b';
                    textContentNode.textContent = errMsg;
                }
            };
        }

        function rebuildFeedFromHistory() {
            conversationHistory.forEach(msg => {
                if (msg.role === 'system') return;
                if (msg.role === 'user') {
                    appendUserMessage(msg.content);
                } else if (msg.role === 'assistant') {
                    // Check if the saved assistant answer contains text + image blocks
                    const containsImage = msg.content.includes('__IMAGE_BLOB__:');
                    
                    if (containsImage) {
                        const parts = msg.content.split('\n\n__IMAGE_BLOB__:');
                        const textPart = parts[0];
                        const imgMeta = parts[1] ? parts[1].split('|') : parts[0].replace('__IMAGE_BLOB__:', '').split('|');
                        
                        const promptAlt = imgMeta[0];
                        const webSourceUrl = imgMeta[1];

                        const { updateContent, removeLoading, embedImageCard } = createAgentResponseStream(false);
                        removeLoading();
                        if(!textPart.startsWith('__IMAGE_BLOB__:')) {
                            updateContent(textPart);
                        } else {
                            updateContent(`Render pipeline lookup for "${promptAlt}":`);
                        }
                        embedImageCard(webSourceUrl, webSourceUrl, promptAlt);
                    } else {
                        const { updateContent, removeLoading } = createAgentResponseStream(false);
                        removeLoading();
                        updateContent(msg.content);
                    }
                }
            });
            setTimeout(scrollToBottom, 200);
        }

        function scrollToBottom() { chatFeed.scrollTop = chatFeed.scrollHeight; }
        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

        submitBtn.addEventListener('click', runConversationTurn);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) runConversationTurn();
        });
    </script>
</body>
</html>
